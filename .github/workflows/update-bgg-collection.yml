name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC (1:05 AM Toronto during EST, 2:05 AM during EDT)
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG collection
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          URL="https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&own=1&stats=1&excludesubtype=boardgameexpansion"
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          
          for i in {1..10}; do
            curl -sS -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -H "$COOKIE_HEADER" -o collection.xml "$URL"
            if grep -q "<items" collection.xml; then
              echo "Collection fetch successful."
              break
            fi
            echo "Waiting for BGG collection (attempt $i)..."
            sleep 30
          done

      - name: Fetch BGG plays
        env:
          BGG_USER: koraytugay
        run: |
          set -euo pipefail
          # Use XMLAPI v1 for plays
          URL="https://boardgamegeek.com/xmlapi/plays?username=${BGG_USER}"
          
          for i in {1..5}; do
            curl -sS -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o plays.xml "$URL"
            if grep -q "<plays" plays.xml; then
              echo "Plays fetch successful."
              # Check if it actually has play data (not just an empty <plays> tag)
              if grep -q "<play" plays.xml; then
                echo "Found play entries."
              else
                echo "Warning: No play entries found in XML."
              fi
              break
            fi
            echo "Waiting for BGG plays (attempt $i)..."
            sleep 20
          done

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- collection.xml plays.xml; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add collection.xml plays.xml
          git commit -m "chore: update collection and plays ($(date -u +%F))"
          git push
