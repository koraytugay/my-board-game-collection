name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC (1:05 AM Toronto during EST, 2:05 AM during EDT)
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG Data
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          USER_AGENT="GitHubAction (curl)"
          
          # 1. Fetch Collection (Original Working Logic)
          COLLECTION_URL="https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&own=1&stats=1&excludesubtype=boardgameexpansion"
          echo "Fetching collection..."
          for i in {1..10}; do
            status=$(curl -sS -o collection.xml -w "%{http_code}" \
              "$COLLECTION_URL" \
              -H 'accept: application/xml' \
              -H "user-agent: $USER_AGENT" \
              -H "$COOKIE_HEADER")
            
            if [ "$status" = "200" ] && grep -q "<items" collection.xml; then
              echo "Collection fetch successful (HTTP $status)."
              break
            elif [ "$status" = "202" ]; then
              echo "BGG is preparing the file (HTTP 202). Sleeping 20s..."
              sleep 20
            else
              echo "Attempt $i: HTTP $status. Retrying in 20s..."
              sleep 20
            fi
          done

          # 2. Fetch Plays (Applying same logic)
          PLAYS_URL="https://boardgamegeek.com/xmlapi2/plays?username=${BGG_USER}"
          echo "Fetching plays..."
          for i in {1..5}; do
            status=$(curl -sS -o plays.xml -w "%{http_code}" \
              "$PLAYS_URL" \
              -H 'accept: application/xml' \
              -H "user-agent: $USER_AGENT" \
              -H "$COOKIE_HEADER")
            
            if [ "$status" = "200" ] && grep -q "<plays" plays.xml; then
              echo "Plays fetch successful (HTTP $status)."
              break
            else
              echo "Attempt $i: HTTP $status. Retrying in 20s..."
              sleep 20
            fi
          done

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- collection.xml plays.xml; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add collection.xml plays.xml
          git commit -m "chore: update collection and plays ($(date -u +%F))"
          git push
