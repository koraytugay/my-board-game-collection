name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC (1:05 AM Toronto during EST, 2:05 AM during EDT)
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG Data
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          USER_AGENT="GitHubAction (curl)"
          
          # 1. Fetch Collection
          COLLECTION_URL="https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&own=1&stats=1&excludesubtype=boardgameexpansion"
          echo "Fetching collection..."
          for i in {1..10}; do
            status=$(curl -sS -o collection.xml -w "%{http_code}" \
              "$COLLECTION_URL" \
              -H 'accept: application/xml' \
              -H "user-agent: $USER_AGENT" \
              -H "$COOKIE_HEADER")
            
            if [ "$status" = "200" ] && grep -q "<items" collection.xml; then
              echo "Collection fetch successful."
              break
            elif [ "$status" = "202" ]; then
              echo "BGG is preparing (202). Sleeping..."
              sleep 20
            else
              echo "Attempt $i: HTTP $status. Retrying..."
              sleep 20
            fi
          done

          # 2. Fetch Plays (Multiple pages to cover Dec/Jan/Feb)
          echo "Fetching plays (Multiple Pages)..."
          > plays.raw.xml
          for page in {1..5}; do
            echo "Fetching page $page..."
            PLAYS_URL="https://boardgamegeek.com/xmlapi/plays?username=${BGG_USER}&page=${page}"
            curl -sS -A "$USER_AGENT" -o "page${page}.xml" "$PLAYS_URL"
            
            if grep -q "<play " "page${page}.xml"; then
              # Extract play nodes and append to raw file
              grep -o "<play [^>]*>.*</play>" "page${page}.xml" >> plays.raw.xml || true
              sleep 5 # Be kind to BGG API
            else
              echo "No more plays found on page $page."
              break
            fi
          done

          # Wrap in a root tag
          echo '<plays>' > plays.xml
          cat plays.raw.xml >> plays.xml
          echo '</plays>' >> plays.xml

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- collection.xml plays.xml; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add collection.xml plays.xml
          git commit -m "chore: update collection and extended play history ($(date -u +%F))"
          git push
