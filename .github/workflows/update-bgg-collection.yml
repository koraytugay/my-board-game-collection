name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG Data
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          USER_AGENT="GitHubAction (curl)"
          mkdir -p plays

          fetch_data() {
            local URL=$1
            local TARGET=$2
            local NAME=$3
            echo "Starting fetch for $NAME..."
            
            for i in {1..15}; do
              # Capture HTTP code and response body
              status=$(curl -sS -o "$TARGET" -w "%{http_code}" \
                "$URL" \
                -H 'accept: application/xml' \
                -H "user-agent: $USER_AGENT" \
                -H "$COOKIE_HEADER")
              
              if [ "$status" = "200" ]; then
                # Check if it's actually BGG XML and not an error page
                if grep -qE "(<items|<plays)" "$TARGET"; then
                  echo "SUCCESS: $NAME fetched correctly."
                  return 0
                else
                  echo "WARNING: Received 200 but content is not valid BGG XML. Retrying..."
                fi
              elif [ "$status" = "202" ]; then
                echo "BGG is preparing $NAME (202). Sleeping 20s (Attempt $i)..."
              else
                echo "Attempt $i failed: HTTP $status. Retrying in 20s..."
              fi
              sleep 20
            done
            echo "ERROR: Failed to fetch $NAME after multiple attempts."
            return 1
          }

          # 1. Fetch Collection
          fetch_data "https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&own=1&stats=1&excludesubtype=boardgameexpansion" "collection.xml" "Collection" || true

          # 2. Monthly Logic
          CURRENT_MONTH=$(date +%Y-%m)
          PREV_MONTH=$(date -d "last month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)

          fetch_month() {
            local TARGET=$1
            local START="${TARGET}-01"
            local END="${TARGET}-31"
            fetch_data "https://boardgamegeek.com/xmlapi2/plays?username=${BGG_USER}&mindate=${START}&maxdate=${END}" "plays/${TARGET}.xml" "Plays for $TARGET" || true
          }

          # --- ONE-TIME BACKFILL ---
          for m in 2025-09 2025-10 2025-11 2025-12 2026-01 2026-02; do
            if [ ! -f "plays/${m}.xml" ] || [ ! -s "plays/${m}.xml" ] || ! grep -q "<plays" "plays/${m}.xml"; then
              fetch_month "$m"
              sleep 5
            fi
          done

          # --- REGULAR UPDATES ---
          fetch_month "$PREV_MONTH"
          sleep 5
          fetch_month "$CURRENT_MONTH"

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          
          # Force add directory to ensure untracked files are seen
          git add collection.xml plays/

          if git diff --quiet --staged; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update collection and play archives ($(date -u +%F))"
          git push
