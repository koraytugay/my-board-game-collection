name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch BGG Data
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          USER_AGENT="GitHubAction (curl)"
          mkdir -p plays

          fetch_data() {
            local URL=$1
            local TARGET=$2
            local NAME=$3
            local TMP_FILE="tmp_fetch.xml"
            echo "Starting fetch for $NAME..."
            
            for i in {1..15}; do
              status=$(curl -sS -o "$TMP_FILE" -w "%{http_code}" \
                "$URL" \
                -H 'accept: application/xml' \
                -H "user-agent: $USER_AGENT" \
                -H "$COOKIE_HEADER")
              
              if [ "$status" = "200" ]; then
                if grep -qE "(<items|<plays)" "$TMP_FILE"; then
                  mv "$TMP_FILE" "$TARGET"
                  echo "SUCCESS: $NAME fetched correctly."
                  return 0
                fi
              elif [ "$status" = "202" ]; then
                echo "BGG is preparing $NAME (202). Sleeping 20s..."
              fi
              sleep 20
            done
            rm -f "$TMP_FILE"
            return 1
          }

          # 1. Fetch Collection (Fetch base games and expansions separately so BGG tags subtypes correctly)
          fetch_data "https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&stats=1&subtype=boardgame" "collection_bg.xml" "Base Games" || true
          fetch_data "https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&stats=1&subtype=boardgameexpansion" "collection_exp.xml" "Expansions" || true

          node -e '
          const fs = require("fs");
          const itemMap = new Map();

          if (fs.existsSync("collection_exp.xml")) {
              const exp = fs.readFileSync("collection_exp.xml", "utf8");
              const expMatches = exp.match(/<item\b[\s\S]*?<\/item>/g) || [];
              for (const item of expMatches) {
                  const idMatch = item.match(/objectid="(\d+)"/);
                  if (idMatch) itemMap.set(idMatch[1], item);
              }
              fs.unlinkSync("collection_exp.xml");
          }

          if (fs.existsSync("collection_bg.xml")) {
              const bg = fs.readFileSync("collection_bg.xml", "utf8");
              const bgMatches = bg.match(/<item\b[\s\S]*?<\/item>/g) || [];
              for (const item of bgMatches) {
                  const idMatch = item.match(/objectid="(\d+)"/);
                  if (idMatch && !itemMap.has(idMatch[1])) {
                      itemMap.set(idMatch[1], item);
                  }
              }
              fs.unlinkSync("collection_bg.xml");
          }

          if (itemMap.size > 0) {
              const items = Array.from(itemMap.values());
              const xml = `<?xml version="1.0" encoding="utf-8"?><items totalitems="${items.length}">${items.join("\n")}</items>`;
              fs.writeFileSync("collection.xml", xml, "utf8");
              console.log(`Successfully merged ${items.length} unique items into collection.xml`);
          }
          '

          # 2. Monthly Logic
          CURRENT_MONTH=$(date +%Y-%m)
          # Safer PREV_MONTH calculation to avoid "March 30 -> Feb 30" bugs
          PREV_MONTH=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m)

          fetch_month() {
            local TARGET=$1
            local START="${TARGET}-01"
            local END="${TARGET}-31"
            fetch_data "https://boardgamegeek.com/xmlapi2/plays?username=${BGG_USER}&mindate=${START}&maxdate=${END}" "plays/${TARGET}.xml" "Plays for $TARGET" || true
          }

          # Always update the last two months to catch any late play reporting
          fetch_month "$PREV_MONTH"
          sleep 5
          fetch_month "$CURRENT_MONTH"

      - name: Download New Images
        run: node download-images.js

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin ${{ github.ref_name }}

          git add collection.xml plays/ images/

          if git diff --quiet --staged; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update collection and monthly play archives ($(date -u +%F))"
          git push
