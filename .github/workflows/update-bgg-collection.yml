name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG Data
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"
          USER_AGENT="GitHubAction (curl)"
          mkdir -p plays

          fetch_data() {
            local URL=$1
            local TARGET=$2
            local NAME=$3
            local TMP_FILE="tmp_fetch.xml"
            echo "Starting fetch for $NAME..."
            
            for i in {1..15}; do
              status=$(curl -sS -o "$TMP_FILE" -w "%{http_code}" \
                "$URL" \
                -H 'accept: application/xml' \
                -H "user-agent: $USER_AGENT" \
                -H "$COOKIE_HEADER")
              
              if [ "$status" = "200" ]; then
                if grep -qE "(<items|<plays)" "$TMP_FILE"; then
                  mv "$TMP_FILE" "$TARGET"
                  echo "SUCCESS: $NAME fetched correctly."
                  return 0
                fi
              elif [ "$status" = "202" ]; then
                echo "BGG is preparing $NAME (202). Sleeping 20s..."
              fi
              sleep 20
            done
            rm -f "$TMP_FILE"
            return 1
          }

          # 1. Fetch Collection (Expanded to include 'played' games for thumbnails, excluding expansions)
          fetch_data "https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&stats=1&excludesubtype=boardgameexpansion" "collection.xml" "Collection" || true

          # 2. Monthly Logic
          CURRENT_MONTH=$(date +%Y-%m)
          # Safer PREV_MONTH calculation to avoid "March 30 -> Feb 30" bugs
          PREV_MONTH=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m)

          fetch_month() {
            local TARGET=$1
            local START="${TARGET}-01"
            local END="${TARGET}-31"
            fetch_data "https://boardgamegeek.com/xmlapi2/plays?username=${BGG_USER}&mindate=${START}&maxdate=${END}" "plays/${TARGET}.xml" "Plays for $TARGET" || true
          }

          # Always update the last two months to catch any late play reporting
          fetch_month "$PREV_MONTH"
          sleep 5
          fetch_month "$CURRENT_MONTH"

      - name: Download New Images
        run: node download-images.js

      - name: Check Game Availability
        run: node check-availability.js

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git add collection.xml plays/ images/ availability.json

          if git diff --quiet --staged; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update collection and monthly play archives ($(date -u +%F))"
          git push
