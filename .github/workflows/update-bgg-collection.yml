name: Update BGG collection

on:
  schedule:
    # Runs every day at 06:05 UTC (1:05 AM Toronto during EST, 2:05 AM during EDT)
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bgg-collection
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch BGG collection (polls for 202 until ready)
        env:
          BGG_USER: koraytugay
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
        run: |
          set -euo pipefail
          URL="https://boardgamegeek.com/xmlapi2/collection?username=koraytugay&own=1&stats=1&excludesubtype=boardgameexpansion"
          COOKIE_HEADER="Cookie: bggusername=${BGG_USER}; bggpassword=${BGG_PASSWORD}"

          for i in {1..10}; do
            status=$(curl -sS -o collection.raw.xml -w "%{http_code}" \
              "$URL" \
              -H 'accept: application/xml' \
              -H 'user-agent: GitHubAction (curl)' \
              -H "$COOKIE_HEADER")
            if [ "$status" = "202" ]; then
              echo "BGG is preparing the file (HTTP 202). Sleeping 20s..."
              sleep 20
            elif [ "$status" = "200" ]; then
              break
            else
              echo "Unexpected HTTP status: $status"
              exit 1
            fi
          done
          # Remove XML prolog more robustly using sed to only target the start of the file
          sed -i 's/^<?xml[^>]*?>//' collection.raw.xml
          cat collection.raw.xml > collection.xml

      - name: Fetch BGG plays (last 100 plays)
        env:
          BGG_USER: koraytugay
        run: |
          set -euo pipefail
          URL="https://boardgamegeek.com/xmlapi2/plays?username=${BGG_USER}"
          curl -sS -o plays.raw.xml "$URL"
          
          # Remove XML prolog more robustly using sed to only target the start of the file
          sed -i 's/^<?xml[^>]*?>//' plays.raw.xml
          cat plays.raw.xml > plays.xml

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          # Check if either file has changed
          if git diff --quiet -- collection.xml plays.xml; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add collection.xml plays.xml
          git commit -m "chore: update collection and plays ($(date -u +%F))"
          git push
