<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play History - My Board Game Collection</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="stats.css">
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Play History</h1>
            <p class="username">@koraytugay on BoardGameGeek</p>
            <nav class="page-nav">
                <a href="index.html" class="nav-link">← Back to Collection</a>
                <a href="stats.html" class="nav-link">View Statistics</a>
                <a href="challenges.html" class="nav-link">Collection Challenges</a>
                <a href="calendar.html" class="nav-link">Play Calendar</a>
                <a href="tournament.html" class="nav-link">Game Tournament</a>
            </nav>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading play history...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="history-content" style="display: none;">
            <section class="history-section">
                <h2>Within This Month</h2>
                <div id="this-month-list" class="history-list">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section class="history-section">
                <h2>Within This Year</h2>
                <div id="this-year-list" class="history-list">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section class="history-section">
                <h2>Within Last Year</h2>
                <div id="last-year-list" class="history-list">
                    <!-- Populated by JS -->
                </div>
            </section>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="history.js"></script>
</body>
</html>
