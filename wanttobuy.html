<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Want to Buy - My Board Game Collection</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .store-availability {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
        body.dark-mode .store-availability {
            border-top-color: #444;
        }
        .store-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 0.8em;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .store-btn-bgb {
            background: #e1f5fe;
            color: #0288d1;
            border: 1px solid #b3e5fc;
        }
        body.dark-mode .store-btn-bgb {
            background: #0d3c52;
            color: #81d4fa;
            border-color: #0288d1;
        }
        .store-btn-bgb:hover {
            background: #0288d1;
            color: white;
        }
        .store-btn-401 {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        body.dark-mode .store-btn-401 {
            background: #4a121a;
            color: #ef9a9a;
            border-color: #c62828;
        }
        .store-btn-401:hover {
            background: #c62828;
            color: white;
        }
        .store-btn-lvlup {
            background: #f3e5f5;
            color: #7b1fa2;
            border: 1px solid #e1bee7;
        }
        body.dark-mode .store-btn-lvlup {
            background: #3c124a;
            color: #ce93d8;
            border-color: #7b1fa2;
        }
        .store-btn-lvlup:hover {
            background: #7b1fa2;
            color: white;
        }
        .store-btn-adj {
            background: #e0f7fa;
            color: #006064;
            border: 1px solid #b2ebf2;
        }
        body.dark-mode .store-btn-adj {
            background: #0d3a40;
            color: #80deea;
            border-color: #006064;
        }
        .store-btn-adj:hover {
            background: #006064;
            color: white;
        }
        .store-btn-greatbg {
            background: #fff8e1;
            color: #f57f17;
            border: 1px solid #ffecb3;
        }
        body.dark-mode .store-btn-greatbg {
            background: #4a3e0b;
            color: #ffe082;
            border-color: #f57f17;
        }
        .store-btn-greatbg:hover {
            background: #f57f17;
            color: white;
        }
        .store-btn-meeplemart {
            background: #eceff1;
            color: #37474f;
            border: 1px solid #cfd8dc;
        }
        body.dark-mode .store-btn-meeplemart {
            background: #263238;
            color: #b0bec5;
            border-color: #37474f;
        }
        .store-btn-meeplemart:hover {
            background: #37474f;
            color: white;
        }
        .store-btn-amazon {
            background: #FFF8E7;
            color: #c45500;
            border: 1px solid #F3A847;
        }
        body.dark-mode .store-btn-amazon {
            background: #372205;
            color: #ff9900;
            border-color: #F3A847;
        }
        .store-btn-amazon:hover {
            background: #ff9900;
            color: white;
        }
        .store-btn-wfs {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        body.dark-mode .store-btn-wfs {
            background: #1b431e;
            color: #a5d6a7;
            border-color: #2e7d32;
        }
        .store-btn-wfs:hover {
            background: #2e7d32;
            color: white;
        }
        .store-btn-f2f {
            background: #fbe9e7;
            color: #d84315;
            border: 1px solid #ffccbc;
        }
        body.dark-mode .store-btn-f2f {
            background: #4e1e12;
            color: #ffab91;
            border-color: #d84315;
        }
        .store-btn-f2f:hover {
            background: #d84315;
            color: white;
        }
        .store-btn-out {
            opacity: 0.6;
        }
        .store-btn-out:hover {
            opacity: 1;
        }
        .store-name {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .store-status {
            font-size: 0.85em;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .store-status-instock {
            background: #4CAF50;
            color: white;
        }
        .store-status-outofstock {
            background: #9e9e9e;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Want to Buy List</h1>
            <p class="username">@koraytugay on BoardGameGeek</p>
            <nav class="page-nav">
                <a href="index.html" class="nav-link">← Back to Collection</a>
                <a href="history.html" class="nav-link">Play History</a>
                <a href="stats.html" class="nav-link">View Statistics</a>
                <a href="challenges.html" class="nav-link">Collection Challenges</a>
                <a href="calendar.html" class="nav-link">Play Calendar</a>
                <a href="tournament.html" class="nav-link">Game Tournament</a>
                <button id="random-game-btn" class="nav-link nav-button">🎲 Random Game</button>
            </nav>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading wanted games...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat-card">
                <span class="stat-number" id="total-games">0</span>
                <span class="stat-label">Total Wanted</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="avg-rating">0</span>
                <span class="stat-label">Avg BGG Rating</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="solo-games">0</span>
                <span class="stat-label">Solo Playable</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="in-stock-games">0</span>
                <span class="stat-label">In Stock Now</span>
            </div>
        </div>

        <div id="controls" class="controls" style="display: none;">
            <div class="controls-row">
                <div class="control-group">
                    <label for="sort-select">Sort by:</label>
                    <select id="sort-select" onchange="sortGames(this.value)">
                        <option value="name">Name</option>
                        <option value="rating-desc">Rating (High to Low)</option>
                        <option value="rating-asc">Rating (Low to High)</option>
                        <option value="year-desc">Year (Newest First)</option>
                        <option value="year-asc">Year (Oldest First)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="view-mode">View:</label>
                    <select id="view-mode" onchange="changeViewMode(this.value)">
                        <option value="grid">Grid</option>
                        <option value="compact">Compact</option>
                        <option value="list">List</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="in-stock-only" onchange="applyFilters()">
                        In Stock Only
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="dark-mode" onchange="toggleDarkMode(this.checked)">
                        Dark Mode
                    </label>
                </div>
            </div>
        </div>

        <div id="games-grid" class="games-grid"></div>
    </div>

    <!-- Random Game Modal -->
    <div id="random-modal" class="modal" style="display: none;">
        <div class="modal-overlay" onclick="closeRandomModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeRandomModal()">×</button>
            <h2>🎲 Random Pick from Want to Buy</h2>
            <div id="random-game-display" class="random-game-display">
                <img id="random-game-img" class="random-game-img" src="" alt="">
                <div class="random-game-info">
                    <h3 id="random-game-name" class="random-game-name"></h3>
                    <p id="random-game-year" class="random-game-year"></p>
                    <div id="random-game-meta" class="random-game-meta"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button onclick="pickRandomGame()" class="btn btn-primary">Pick Another</button>
                <button onclick="openRandomGameBGG()" class="btn btn-secondary">View on BGG</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="wanttobuy.js"></script>
</body>
</html>
